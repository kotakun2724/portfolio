<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- K + Diamond logo - optimized for favicon -->
  <rect width="64" height="64" fill="transparent"/>
  <g fill="#fff">
    <!-- Vertical stem of K -->
    <polygon points="8,4 14,4 14,60 8,60"/>
    <!-- Diamond (rhombus) rotated 45deg, connected to stem -->
    <polygon points="14,32 38,8 56,32 38,56" fill="none" stroke="#fff" stroke-width="6" stroke-linejoin="miter"/>
  </g>
</svg>
